# Railway: Only build and run the Express API (apps/api)
# The frontend (apps/web) is deployed on Vercel

[phases.setup]
nixPkgs = ["nodejs_20", "npm-9_x"]

[phases.install]
cmds = ["npm ci --ignore-scripts"]

[phases.build]
cmds = [
  "npx prisma generate --schema=apps/api/prisma/schema.prisma",
  "npm run build --workspace=@swarm/api"
]

[start]
cmd = "npx prisma db push --schema=apps/api/prisma/schema.prisma --accept-data-loss && node apps/api/dist/index.js"
